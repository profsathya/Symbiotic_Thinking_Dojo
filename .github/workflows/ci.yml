name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint, types, tests, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (errors fail the build)
        run: npx eslint src

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Production build
        run: npx next build

  backend:
    name: Backend — syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile all backend modules
        run: python -m compileall -q backend
